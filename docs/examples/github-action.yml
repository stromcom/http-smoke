name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, json
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-progress

      - name: Run smoke tests
        env:
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
        run: |
          vendor/bin/http-smoke ${{ github.event.inputs.environment || 'staging' }} \
            --concurrency=10 \
            --output-json=build/smoke.json \
            --output=build/smoke.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: build/
          retention-days: 30
